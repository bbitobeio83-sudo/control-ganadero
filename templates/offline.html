<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — Control Ganadero</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a3a2a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: #fff;
      color: #1a3a2a;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }
    h1 { font-size: 1.5rem; margin-bottom: .5rem; color: #1a3a2a; }
    p { color: #555; margin-bottom: 1.5rem; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #2e7d32;
      color: #fff;
      border: none;
      padding: .75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #1a3a2a; }
    .hint {
      margin-top: 1.5rem;
      font-size: .8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🐄</span>
    <h1>Sin conexión</h1>
    <p>No se puede conectar al servidor.<br>
       Verifica que la app esté iniciada en la computadora y que estés en la misma red WiFi.</p>
    <button class="btn" onclick="location.reload()">Reintentar</button>
    <p class="hint">Control Ganadero funciona en red local (WiFi)</p>
  </div>
</body>
</html>
