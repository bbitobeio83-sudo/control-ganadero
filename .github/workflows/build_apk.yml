name: Compilar APK Control Ganadero

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Compilar APK con Docker
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/home/user/hostcwd \
          kivy/buildozer:latest \
          android debug

    - name: Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: control-ganadero-apk
        path: bin/*.apk
        if-no-files-found: error
        retention-days: 30
